<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ideealuce | În mentenanță</title>
    <style>
      :root {
        --bone: #f7f3eb;
        --filament: #1f2937;
        --gold: #c8a96b;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: var(--bone);
        color: var(--filament);
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
      }

      .card {
        max-width: 560px;
        padding: 32px;
        border: 1px solid rgba(31, 41, 55, 0.08);
        background: rgba(255, 255, 255, 0.82);
        text-align: center;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
      }

      .badge {
        display: inline-block;
        margin-bottom: 12px;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(200, 169, 107, 0.15);
        color: var(--gold);
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
        color: var(--filament);
      }

      p {
        margin: 0 0 16px;
        line-height: 1.6;
        color: #4b5563;
      }

      a {
        color: var(--gold);
        font-weight: 700;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">În mentenanță</div>
      <h1>Ideealuce</h1>
      <p>Site-ul nostru este momentan în mentenanță și va reveni curând cu noul conținut.</p>
      <p>Vă mulțumim pentru înțelegere.</p>
    </main>
  </body>
</html>
